name: APK bauen

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Gradle installieren
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Debug-APK bauen
        run: gradle assembleDebug --no-daemon

      - name: APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: FotoNotiz-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
